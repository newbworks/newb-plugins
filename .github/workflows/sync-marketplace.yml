name: Sync marketplace listings

# Regenerate the installable per-agent plugins from the newb catalog. Runs
# hourly, on demand, and on a repository_dispatch the lobby can fire when an
# agent is published (for near-instant listing). Hand-maintained plugins
# (newb, newb-builder, curated recruiting-copilot) are never touched — the sync
# only manages wrappers it generated (marked with .newb-generated).

on:
  schedule:
    - cron: "17 * * * *"          # hourly, offset off the top of the hour
  workflow_dispatch: {}
  repository_dispatch:
    types: [agent-published]

permissions:
  contents: write

concurrency:
  group: sync-marketplace
  cancel-in-progress: false

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Sync from catalog
        env:
          # Set repo variable NEWB_CATALOG_URL to the executor's catalog
          # (Settings → Secrets and variables → Actions → Variables). Falls back
          # to the current executor host if unset.
          NEWB_CATALOG_URL: ${{ vars.NEWB_CATALOG_URL }}
        run: |
          python3 scripts/sync_marketplace.py \
            --catalog-url "${NEWB_CATALOG_URL:-https://agents.newb.works/catalog.json}" \
            --root .

      - name: Commit & push if changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            git config user.name "newb-bot"
            git config user.email "hello@newb.works"
            git add -A
            git commit -m "chore(sync): update marketplace listings from catalog"
            git push
          else
            echo "No changes."
          fi
